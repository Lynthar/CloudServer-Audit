name: ShellCheck

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install ShellCheck 0.11.0
        run: |
          set -euo pipefail
          VERSION=v0.11.0
          URL="https://github.com/koalaman/shellcheck/releases/download/${VERSION}/shellcheck-${VERSION}.linux.x86_64.tar.xz"
          curl -fsSL "$URL" | tar -xJ
          sudo install -m 0755 "shellcheck-${VERSION}/shellcheck" /usr/local/bin/shellcheck
          shellcheck --version

      - name: Run ShellCheck
        run: |
          set -euo pipefail
          mapfile -t FILES < <(find . -type f \( -name '*.sh' -o -name 'vpssec' \) ! -path './.git/*' | sort)
          printf 'Scanning %d file(s):\n' "${#FILES[@]}"
          printf '  %s\n' "${FILES[@]}"
          echo
          shellcheck -x -f gcc --shell=bash "${FILES[@]}"
